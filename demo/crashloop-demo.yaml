apiVersion: apps/v1
kind: Deployment
metadata:
  name: crashloop-demo
  namespace: demo-broken-apps
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crashloop-demo
  template:
    metadata:
      labels:
        app: crashloop-demo
    spec:
      containers:
        - name: app
          image: python:3.11-alpine
          command: ["python", "-c"]
          args:
            - |
              import sys
              print("cannot connect to database: connection refused")
              sys.exit(1)
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
