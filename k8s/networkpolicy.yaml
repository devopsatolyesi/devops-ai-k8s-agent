apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-kube-agent-default
  namespace: ai-kube-agent
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ai-kube-agent
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - {}

