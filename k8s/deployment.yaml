apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-kube-agent
  namespace: ai-kube-agent
  labels:
    app.kubernetes.io/name: ai-kube-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ai-kube-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ai-kube-agent
    spec:
      serviceAccountName: ai-kube-agent
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: ai-kube-agent
          image: ai-kube-agent:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: ai-kube-agent-config
            - secretRef:
                name: pioneer-ai-secret
                optional: true
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: data
          emptyDir: {}
